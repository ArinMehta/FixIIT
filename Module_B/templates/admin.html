<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixIIT - Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <div class="navbar">
            <h2>Admin Panel</h2>
            <div class="navbar-links">
                <button onclick="goToDashboard()">Back to Dashboard</button>
                <button class="logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="alert-container"></div>

        <!-- Admin Info -->
        <div class="user-info">
            <strong id="userName"></strong>
            <span class="admin-badge">Admin</span>
        </div>

        <!-- Tickets Management -->
        <h3 style="margin-bottom: 20px; color: #333;">Manage All Tickets</h3>
        
        <div id="ticketsContainer">
            <div class="loading">Loading all tickets...</div>
        </div>
    </div>

    <!-- Update Ticket Modal -->
    <div id="updateTicketModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeUpdateModal()">&times;</button>
            <h2>Update Ticket</h2>
            
            <form id="updateTicketForm">
                <div class="form-group">
                    <label>Ticket ID</label>
                    <input type="text" id="ticketId" readonly style="background: #f0f0f0;">
                </div>

                <div class="form-group">
                    <label for="status_id">Status ID</label>
                    <select id="status_id" name="status_id">
                        <option value="1">1 - Open</option>
                        <option value="2">2 - In Progress</option>
                        <option value="3">3 - Closed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Update description..."></textarea>
                </div>

                <button type="submit" id="updateBtn">Update Ticket</button>
                <button type="button" class="secondary" onclick="closeUpdateModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        // Token management
        const TokenManager = {
            set: function(token) {
                localStorage.setItem('auth_token', token);
            },
            get: function() {
                return localStorage.getItem('auth_token');
            },
            clear: function() {
                localStorage.removeItem('auth_token');
            },
            exists: function() {
                return !!this.get();
            }
        };

        // API communication
        const API = {
            baseURL: window.location.origin,
            
            request: async function(endpoint, options = {}) {
                const url = this.baseURL + endpoint;
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };

                const token = TokenManager.get();
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                try {
                    const response = await fetch(url, {
                        ...options,
                        headers
                    });
                    
                    const data = await response.json();
                    return {
                        success: response.ok,
                        status: response.status,
                        data: data
                    };
                } catch (error) {
                    return {
                        success: false,
                        status: 0,
                        data: { error: error.message }
                    };
                }
            },

            isAuth: async function() {
                return this.request('/isAuth', { method: 'GET' });
            },

            getTickets: async function() {
                return this.request('/admin/tickets', { method: 'GET' });
            },

            updateTicket: async function(ticketId, statusId, description) {
                const body = { status_id: statusId };
                if (description) {
                    body.description = description;
                }
                return this.request(`/tickets/${ticketId}`, {
                    method: 'PUT',
                    body: JSON.stringify(body)
                });
            },

            deleteTicket: async function(ticketId) {
                return this.request(`/tickets/${ticketId}`, {
                    method: 'DELETE'
                });
            }
        };

        // UI utilities
        const UI = {
            showAlert: function(message, type = 'info') {
                const container = document.getElementById('alert-container');
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert ${type}`;
                alertDiv.textContent = message;
                container.innerHTML = '';
                container.appendChild(alertDiv);
                
                if (type === 'success') {
                    setTimeout(() => {
                        alertDiv.remove();
                    }, 3000);
                }
            }
        };

        // Navigation
        function goToDashboard() {
            window.location.href = '/dashboard';
        }

        function logout() {
            TokenManager.clear();
            window.location.href = '/';
        }

        // Modal functions
        function openUpdateModal(ticketId, description) {
            document.getElementById('ticketId').value = ticketId;
            document.getElementById('description').value = description;
            document.getElementById('status_id').value = '1';
            document.getElementById('updateTicketModal').classList.add('show');
        }

        function closeUpdateModal() {
            document.getElementById('updateTicketModal').classList.remove('show');
            document.getElementById('updateTicketForm').reset();
        }

        // Delete ticket
        async function deleteTicket(ticketId) {
            if (!confirm('Are you sure you want to delete this ticket?')) {
                return;
            }

            const result = await API.deleteTicket(ticketId);

            if (result.success) {
                UI.showAlert('Ticket deleted successfully!', 'success');
                loadAllTickets();
            } else {
                const errorMsg = result.data.error || 'Failed to delete ticket';
                UI.showAlert(errorMsg, 'error');
            }
        }

        // Load all tickets (admin view)
        async function loadAllTickets() {
            const container = document.getElementById('ticketsContainer');
            container.innerHTML = '<div class="loading">Loading all tickets...</div>';

            const result = await API.getTickets();

            if (!result.success) {
                container.innerHTML = '';
                UI.showAlert('Failed to load tickets', 'error');
                return;
            }

            const tickets = result.data.tickets || [];
            container.innerHTML = '';

            if (tickets.length === 0) {
                container.innerHTML = '<div class="no-tickets">No tickets in the system.</div>';
                return;
            }

            const html = tickets.map(ticket => `
                <div class="ticket-card">
                    <h3>Ticket #${ticket.ticket_id} (Member #${ticket.member_id})</h3>
                    <div class="ticket-meta">
                        <span>Location: ${ticket.location_id}</span>
                        <span>Category: ${ticket.category_id}</span>
                        <span>Created: ${new Date(ticket.created_date).toLocaleDateString()}</span>
                    </div>
                    <div class="ticket-description">${escapeHtml(ticket.description)}</div>
                    <div style="margin-bottom: 12px;">
                        <span class="status-badge open">Status ID: ${ticket.status_id}</span>
                    </div>
                    <div class="ticket-actions">
                        <button onclick="openUpdateModal(${ticket.ticket_id}, '${escapeQuotes(ticket.description)}')">Edit</button>
                        <button class="danger" onclick="deleteTicket(${ticket.ticket_id})">Delete</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // Update ticket form submission
        document.getElementById('updateTicketForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const ticketId = document.getElementById('ticketId').value;
            const statusId = document.getElementById('status_id').value;
            const description = document.getElementById('description').value;

            if (!ticketId || !statusId) {
                UI.showAlert('Please fill required fields', 'error');
                return;
            }

            const result = await API.updateTicket(ticketId, statusId, description);

            if (result.success) {
                UI.showAlert('Ticket updated successfully!', 'success');
                closeUpdateModal();
                loadAllTickets();
            } else {
                const errorMsg = result.data.error || 'Failed to update ticket';
                UI.showAlert(errorMsg, 'error');
            }
        });

        // Close modal on outside click
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('updateTicketModal');
            if (e.target === modal) {
                closeUpdateModal();
            }
        });

        // Helper to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper to escape quotes in strings
        function escapeQuotes(text) {
            return (text || '').replace(/'/g, "\\'");
        }

        // Load user info
        async function loadUserInfo() {
            const result = await API.isAuth();
            
            if (!result.success || !result.data.is_admin) {
                TokenManager.clear();
                window.location.href = '/';
                return null;
            }

            const user = result.data;
            document.getElementById('userName').textContent = `${user.first_name} ${user.last_name}`;

            return user;
        }

        // Initialize
        async function init() {
            if (!TokenManager.exists()) {
                window.location.href = '/';
                return;
            }

            await loadUserInfo();
            await loadAllTickets();
        }

        // Start app
        init();
    </script>
</body>
</html>
